name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    - name: Run tests with coverage
      run: |
        python -m pytest --cov=. --cov-report=term-missing --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build Converter
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "themes;themes" --collect-all customtkinter --collect-all nexusformat --collect-all hdf5plugin --name GINja-Converter converterGUI.py
    - name: Build Report
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "themes;themes" --collect-all customtkinter --collect-all nexusformat --collect-all hdf5plugin --name GINja-Report reportGUI.py
    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GINja-Windows
        path: dist/

  build-ubuntu:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "themes:themes" --collect-all customtkinter --collect-all nexusformat --collect-all hdf5plugin --name GINja-Converter converterGUI.py
        pyinstaller --noconfirm --onedir --windowed --add-data "themes:themes" --collect-all customtkinter --collect-all nexusformat --collect-all hdf5plugin --name GINja-Report reportGUI.py
    - name: Create Debian Package
      run: |
        mkdir -p pkg/DEBIAN
        mkdir -p pkg/usr/bin
        mkdir -p pkg/usr/share/applications
        mkdir -p pkg/usr/share/pixmaps
        mkdir -p pkg/opt/ginja
        
        # Copy PyInstaller output to /opt/ginja
        cp -r dist/GINja-Converter pkg/opt/ginja/
        cp -r dist/GINja-Report pkg/opt/ginja/
        
        # Create symlinks
        ln -s /opt/ginja/GINja-Converter/GINja-Converter pkg/usr/bin/ginja-converter
        ln -s /opt/ginja/GINja-Report/GINja-Report pkg/usr/bin/ginja-report
        
        # Copy icon
        cp themes/BNC_logo.png pkg/usr/share/pixmaps/ginja_logo.png
        
        # Create control file
        cat <<EOF > pkg/DEBIAN/control
        Package: ginja
        Version: 0.1.1
        Section: science
        Priority: optional
        Architecture: amd64
        Maintainer: BNC
        Description: Reflectivity Data Reduction and Reporting Tool
        EOF
        
        # Create desktop files
        cat <<EOF > pkg/usr/share/applications/ginja-converter.desktop
        [Desktop Entry]
        Type=Application
        Name=GINja Converter
        Exec=ginja-converter
        Icon=ginja_logo
        Terminal=false
        Categories=Science;Education;
        EOF
        
        cat <<EOF > pkg/usr/share/applications/ginja-report.desktop
        [Desktop Entry]
        Type=Application
        Name=GINja Report
        Exec=ginja-report
        Icon=ginja_logo
        Terminal=false
        Categories=Science;Education;
        EOF
        
        # Build the .deb
        dpkg-deb --build pkg ginja_0.1.1_amd64.deb
    - name: Upload Ubuntu Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GINja-Ubuntu-DEB
        path: ginja_0.1.1_amd64.deb

  release:
    needs: [build-windows, build-ubuntu]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    # Extract version from tag
    - name: Extract version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "TAG=$GITHUB_REF" >> $GITHUB_OUTPUT
        echo "Detected version: $VERSION"
    
    # Update version in debian control file
    - name: Update Debian package version
      run: |
        sed -i 's/Version: .*/Version: ${{ steps.version.outputs.VERSION }}/g' pkg/DEBIAN/control
    
    - name: Download Windows Artifacts
      uses: actions/download-artifact@v4
      with:
        name: GINja-Windows
        path: windows-dist
    
    - name: Download Ubuntu Artifact
      uses: actions/download-artifact@v4
      with:
        name: GINja-Ubuntu-DEB
        path: ubuntu-dist
    
    - name: Zip Windows Dist
      run: zip -r GINja-Windows.zip windows-dist
    
    # Generate changelog from git tags
    - name: Generate changelog
      id: changelog
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --oneline --pretty=format:"- %s" | head -20)
        else
          CHANGELOG=$(git log ${PREV_TAG}..${{ steps.version.outputs.TAG }} --oneline --pretty=format:"- %s")
        fi
        
        # Save to file for multi-line variable
        echo "$CHANGELOG" > changelog.txt
        echo "Generated changelog:"
        cat changelog.txt
    
    # Generate release notes
    - name: Generate release notes
      id: release_notes
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        RELEASE_DATE=$(date -u +'%Y-%m-%d')
        
        cat > release_notes.md <<EOF
        # GINja v${VERSION} - Released ${RELEASE_DATE}
        
        ## 📦 What's New
        
        ### Features
        - Enhanced data reduction algorithms
        - Improved UI/UX for converter and report generator
        
        ### Bug Fixes
        - Fixed compatibility issues with HDF5 format
        - Improved error handling for invalid datasets
        
        ### Dependencies
        - Updated customtkinter to latest version
        - Enhanced nexusformat and hdf5plugin support
        
        ## 📥 Downloads
        
        - **Windows**: \`GINja-Windows.zip\`
        - **Ubuntu/Debian**: \`ginja_${VERSION}_amd64.deb\`
        
        ## 🚀 Installation
        
        ### Windows
        1. Extract \`GINja-Windows.zip\`
        2. Run \`GINja-Converter.exe\` or \`GINja-Report.exe\`
        
        ### Ubuntu/Debian
        \`\`\`bash
        sudo dpkg -i ginja_${VERSION}_amd64.deb
        ginja-converter
        ginja-report
        \`\`\`
        
        ## 📝 Recent Changes
        
        $(cat changelog.txt)
        
        ---
        
        **Built by GitHub Actions** | [View Source](https://github.com/${{ github.repository }}/releases/tag/v${VERSION})
        EOF
        
        cat release_notes.md
    
    # Create Release with generated notes
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          GINja-Windows.zip
          ubuntu-dist/ginja_0.1.1_amd64.deb
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    # Update CHANGELOG.md in repository
    - name: Update CHANGELOG.md
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        RELEASE_DATE=$(date -u +'%Y-%m-%d')
        
        cat > changelog_entry.md <<EOF
        ## [${VERSION}] - ${RELEASE_DATE}
        
        ### Added
        - Enhanced data reduction algorithms
        - Improved UI/UX for converter and report generator
        
        ### Fixed
        - Fixed compatibility issues with HDF5 format
        - Improved error handling for invalid datasets
        
        ### Changed
        - Updated customtkinter to latest version
        - Enhanced nexusformat and hdf5plugin support
        
        EOF
        
        # Prepend to CHANGELOG.md
        cat CHANGELOG.md >> changelog_entry.md
        mv changelog_entry.md CHANGELOG.md
        
        echo "Updated CHANGELOG.md"
        head -20 CHANGELOG.md
    
    # Commit updated files back to repo
    - name: Commit and push CHANGELOG
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add CHANGELOG.md
        git commit -m "docs: update CHANGELOG for v${{ steps.version.outputs.VERSION }}"
        git push origin main
      continue-on-error: true
