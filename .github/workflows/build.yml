name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    - name: Run tests with coverage
      run: |
        python -m pytest --cov=. --cov-report=term-missing --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build Converter
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "themes;themes" --collect-all customtkinter --collect-all nexusformat --collect-all hdf5plugin --name GINja-Converter converterGUI.py
    - name: Build Report
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "themes;themes" --collect-all customtkinter --collect-all nexusformat --collect-all hdf5plugin --name GINja-Report reportGUI.py
    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GINja-Windows
        path: dist/

  build-ubuntu:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "themes:themes" --collect-all customtkinter --collect-all nexusformat --collect-all hdf5plugin --name GINja-Converter converterGUI.py
        pyinstaller --noconfirm --onedir --windowed --add-data "themes:themes" --collect-all customtkinter --collect-all nexusformat --collect-all hdf5plugin --name GINja-Report reportGUI.py
    - name: Create Debian Package
      run: |
        mkdir -p pkg/DEBIAN
        mkdir -p pkg/usr/bin
        mkdir -p pkg/usr/share/applications
        mkdir -p pkg/usr/share/pixmaps
        mkdir -p pkg/opt/ginja
        
        # Copy PyInstaller output to /opt/ginja
        cp -r dist/GINja-Converter pkg/opt/ginja/
        cp -r dist/GINja-Report pkg/opt/ginja/
        
        # Create symlinks
        ln -s /opt/ginja/GINja-Converter/GINja-Converter pkg/usr/bin/ginja-converter
        ln -s /opt/ginja/GINja-Report/GINja-Report pkg/usr/bin/ginja-report
        
        # Copy icon
        cp themes/BNC_logo.png pkg/usr/share/pixmaps/ginja_logo.png
        
        # Create control file
        cat <<EOF > pkg/DEBIAN/control
        Package: ginja
        Version: 0.1.1
        Section: science
        Priority: optional
        Architecture: amd64
        Maintainer: BNC
        Description: Reflectivity Data Reduction and Reporting Tool
        EOF
        
        # Create desktop files
        cat <<EOF > pkg/usr/share/applications/ginja-converter.desktop
        [Desktop Entry]
        Type=Application
        Name=GINja Converter
        Exec=ginja-converter
        Icon=ginja_logo
        Terminal=false
        Categories=Science;Education;
        EOF
        
        cat <<EOF > pkg/usr/share/applications/ginja-report.desktop
        [Desktop Entry]
        Type=Application
        Name=GINja Report
        Exec=ginja-report
        Icon=ginja_logo
        Terminal=false
        Categories=Science;Education;
        EOF
        
        # Build the .deb
        dpkg-deb --build pkg ginja_0.1.1_amd64.deb
    - name: Upload Ubuntu Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GINja-Ubuntu-DEB
        path: ginja_0.1.1_amd64.deb

  release:
    needs: [build-windows, build-ubuntu]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows Artifacts
      uses: actions/download-artifact@v4
      with:
        name: GINja-Windows
        path: windows-dist
    - name: Download Ubuntu Artifact
      uses: actions/download-artifact@v4
      with:
        name: GINja-Ubuntu-DEB
        path: ubuntu-dist
    - name: Zip Windows Dist
      run: zip -r GINja-Windows.zip windows-dist
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          GINja-Windows.zip
          ubuntu-dist/ginja_0.1.1_amd64.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
